<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strategic Decision Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="command-center">
      <section class="stage" aria-label="Strategic Decision Lab cockpit">
        <canvas id="decisionCanvas" aria-label="3D decision simulation view"></canvas>

        <header class="glass topbar">
          <div>
            <p class="eyebrow">Decision Intelligence</p>
            <h1>Strategic Decision Lab</h1>
          </div>
          <div class="top-actions" aria-label="Primary actions">
            <button id="simulateButton" class="action-button active" type="button">Run</button>
            <button id="optimizeButton" class="action-button" type="button">Optimize</button>
            <button id="compareButton" class="action-button" type="button">Compare</button>
            <button id="copyButton" class="action-button" type="button">Brief</button>
            <button id="resetButton" class="action-button muted-button" type="button">Reset</button>
          </div>
        </header>

        <aside class="glass control-rail">
          <div class="rail-head">
            <span id="caseCode" class="status-chip"></span>
            <select id="scenarioSelect" aria-label="Business scenario">
              <option value="healthcare">Healthcare</option>
              <option value="retail">Retail</option>
              <option value="education">Education</option>
              <option value="finance">Finance</option>
              <option value="supply">Supply Chain</option>
            </select>
          </div>

          <div class="control-grid">
            <label class="control-tile" for="budget">
              <span>Invest</span>
              <strong id="budgetValue"></strong>
              <input id="budget" type="range" min="0" max="100" value="55" />
            </label>

            <label class="control-tile" for="demand">
              <span>Demand</span>
              <strong id="demandValue"></strong>
              <input id="demand" type="range" min="0" max="100" value="62" />
            </label>

            <label class="control-tile" for="operations">
              <span>Ready</span>
              <strong id="operationsValue"></strong>
              <input id="operations" type="range" min="0" max="100" value="58" />
            </label>

            <label class="control-tile" for="risk">
              <span>Risk</span>
              <strong id="riskValue"></strong>
              <input id="risk" type="range" min="0" max="100" value="48" />
            </label>
          </div>
        </aside>

        <section class="glass score-strip" aria-label="Decision metrics">
          <article>
            <span>Value</span>
            <strong id="valueScore"></strong>
            <small id="valueDetail"></small>
          </article>
          <article>
            <span>Risk</span>
            <strong id="riskScore"></strong>
            <small id="riskDetail"></small>
          </article>
          <article>
            <span>Impact</span>
            <strong id="impactScore"></strong>
            <small id="impactDetail"></small>
          </article>
          <article>
            <span>Confidence</span>
            <strong id="confidenceScore"></strong>
            <small id="confidenceDetail"></small>
          </article>
        </section>

        <section class="glass decision-card" aria-label="Recommendation">
          <div class="decision-status">
            <span id="decisionStage"></span>
            <span id="governanceLevel"></span>
          </div>
          <h2 id="recommendationTitle"></h2>
          <p id="recommendationText"></p>
        </section>

        <section class="glass insight-dock" aria-label="Decision tools">
          <button class="dock-button selected" type="button" data-view="drivers">Drivers</button>
          <button class="dock-button" type="button" data-view="sensitivity">Sensitivity</button>
          <button class="dock-button" type="button" data-view="actions">Actions</button>
          <button class="dock-button" type="button" data-view="brief">Brief</button>
        </section>

        <section class="glass drawer" aria-live="polite">
          <div class="drawer-head">
            <p id="drawerTitle" class="eyebrow"></p>
            <span id="riskBadge" class="status-chip"></span>
          </div>
          <div id="drawerContent" class="drawer-content"></div>
          <pre id="decisionBrief" class="sr-brief"></pre>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
